appId: com.horus.app
productName: Horus
directories:
  buildResources: resources
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!tests/*"
  - "!electron.vite.config.*"
  - "!{tsconfig,tsconfig.*}.json"
mac:
  target:
    - dmg
    - zip
  artifactName: ${name}-${version}-${arch}.${ext}
linux:
  target:
    - AppImage
    - deb
  artifactName: ${name}-${version}-${arch}.${ext}
win:
  target:
    - nsis
  artifactName: ${name}-${version}-setup.${ext}
