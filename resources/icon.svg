<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="100%" stop-color="#0d0e18"/>
    </linearGradient>
    <linearGradient id="eye" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d9a5f"/>
      <stop offset="100%" stop-color="#2d7a4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6e9fff"/>
      <stop offset="100%" stop-color="#3d9a5f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Eye shape -->
  <path d="M108 256 C108 256 192 148 256 148 C320 148 404 256 404 256 C404 256 320 364 256 364 C192 364 108 256 108 256Z" fill="none" stroke="url(#accent)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Iris -->
  <circle cx="256" cy="256" r="52" fill="url(#eye)"/>
  <!-- Pupil -->
  <circle cx="256" cy="256" r="22" fill="#0d0e18"/>
  <!-- Pupil highlight -->
  <circle cx="246" cy="246" r="7" fill="rgba(255,255,255,0.3)"/>
  <!-- Teardrop / Horus mark -->
  <path d="M256 308 Q256 380 224 420 Q216 432 228 428 Q256 416 256 380" fill="url(#eye)" opacity="0.8"/>
  <!-- Scan lines -->
  <line x1="140" y1="220" x2="200" y2="220" stroke="#6e9fff" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="140" y1="236" x2="188" y2="236" stroke="#6e9fff" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <line x1="312" y1="276" x2="372" y2="276" stroke="#3d9a5f" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="324" y1="292" x2="372" y2="292" stroke="#3d9a5f" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <!-- Corner brackets -->
  <path d="M128 168 L128 128 L168 128" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="4" stroke-linecap="round"/>
  <path d="M384 168 L384 128 L344 128" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="4" stroke-linecap="round"/>
  <path d="M128 344 L128 384 L168 384" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="4" stroke-linecap="round"/>
  <path d="M384 344 L384 384 L344 384" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="4" stroke-linecap="round"/>
</svg>
